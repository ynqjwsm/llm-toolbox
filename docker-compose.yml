services:
  llm-toolbox:
    image: brantwang/llm-toolbox:v0.0.2
    container_name: llm-toolbox
    ports:
      - "${APP_PORT:-8000}:${APP_PORT:-8000}"
    environment:
      - APP_HOST=0.0.0.0
      - APP_PORT=${APP_PORT:-8000}
      - APP_RELOAD=false
    volumes:
      - ./data:/app/data
    restart: unless-stopped
