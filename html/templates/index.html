<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM工具箱</title>
    <link href="/static/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container-fluid h-100 p-0">
        <div class="row g-0 h-100">
            <!-- 左侧边栏 -->
            <div class="col-md-3 col-lg-2 bg-white border-end sidebar">
                <!-- Logo区域 -->
                <div class="sidebar-header d-flex align-items-center p-3 border-bottom">
                    <i class="bi bi-tools fs-4 me-2 text-primary"></i>
                    <h5 class="mb-0 fw-bold">LLM工具箱</h5>
                </div>

                <!-- 工具列表 -->
                <div class="sidebar-section p-3">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <h6 class="text-muted mb-0 small">
                            <i class="bi bi-app-indicator me-1"></i>工具列表
                        </h6>
                        <button class="btn btn-sm btn-outline-primary" onclick="showToolModal()" title="新建工具">
                            <i class="bi bi-plus-lg"></i>
                        </button>
                    </div>
                    <div class="list-group list-group-flush tool-list" id="tool-list"></div>
                </div>

                <!-- 端点管理 -->
                <div class="sidebar-section p-3 border-top">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <h6 class="text-muted mb-0 small">
                            <i class="bi bi-hdd-stack me-1"></i>端点管理
                        </h6>
                        <button class="btn btn-sm btn-outline-secondary" onclick="showEndpointModal()" title="添加端点">
                            <i class="bi bi-plus-lg"></i>
                        </button>
                    </div>
                    <div class="list-group list-group-flush endpoint-list" id="endpoint-list"></div>
                </div>

                <!-- 历史对话 -->
                <div class="sidebar-section p-3 border-top">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <h6 class="text-muted mb-0 small">
                            <i class="bi bi-clock-history me-1"></i>历史对话
                        </h6>
                    </div>
                    <div class="list-group list-group-flush conversation-list" id="conversation-list"></div>
                </div>
            </div>

            <!-- 右侧主区域 -->
            <div class="col-md-9 col-lg-10 main-content d-flex flex-column">
                <!-- 顶部工具栏 -->
                <nav class="navbar navbar-light bg-white border-bottom px-3 py-2" id="tool-header" style="display: none;">
                    <div class="d-flex align-items-center">
                        <span class="fw-semibold me-2" id="current-tool-name"></span>
                        <span class="badge" id="current-tool-type"></span>
                    </div>
                    <div class="d-flex gap-2">
                        <button class="btn btn-outline-secondary btn-sm" onclick="clearChat()" title="清空对话">
                            <i class="bi bi-trash"></i>
                        </button>
                        <button class="btn btn-outline-secondary btn-sm" onclick="editCurrentTool()" title="编辑工具">
                            <i class="bi bi-pencil"></i>
                        </button>
                    </div>
                </nav>

                <!-- 对话区域 -->
                <div class="flex-grow-1 overflow-auto p-3 bg-light chat-container" id="chat-container">
                    <div class="chat-messages mx-auto" id="chat-messages">
                        <div class="welcome-card text-center py-5">
                            <div class="mb-4">
                                <i class="bi bi-robot display-1 text-primary opacity-25"></i>
                            </div>
                            <h4 class="text-muted mb-3">欢迎使用LLM工具箱</h4>
                            <p class="text-muted mb-4">选择左侧工具开始对话，或配置端点和模型</p>
                            <div class="row g-3 justify-content-center">
                                <div class="col-auto">
                                    <div class="card feature-card h-100 border-0 shadow-sm" onclick="showToolModal()">
                                        <div class="card-body text-center p-3">
                                            <i class="bi bi-plus-circle fs-3 text-primary mb-2"></i>
                                            <p class="small text-muted mb-0">创建工具</p>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-auto">
                                    <div class="card feature-card h-100 border-0 shadow-sm" onclick="showEndpointModal()">
                                        <div class="card-body text-center p-3">
                                            <i class="bi bi-hdd-stack fs-3 text-secondary mb-2"></i>
                                            <p class="small text-muted mb-0">添加端点</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 普通输入区域 -->
                <div class="bg-white border-top p-3" id="chat-input-area" style="display: none;">
                    <div class="mb-2" id="image-upload-area" style="display: none;">
                        <div class="d-flex align-items-center gap-2 flex-wrap">
                            <input type="file" id="image-input" accept="image/*" class="d-none">
                            <button class="btn btn-outline-secondary btn-sm" onclick="document.getElementById('image-input').click()">
                                <i class="bi bi-image me-1"></i>上传图片
                            </button>
                            <img id="image-preview" class="rounded border image-preview d-none">
                            <button class="btn btn-outline-danger btn-sm d-none" id="remove-image-btn" onclick="removeImage()">
                                <i class="bi bi-x"></i>
                            </button>
                        </div>
                    </div>
                    <div class="input-group input-group-lg">
                        <textarea class="form-control border-0 bg-light chat-input"
                                  id="chat-input" rows="1"
                                  placeholder="输入消息... (Enter发送，Shift+Enter换行)"
                                  disabled></textarea>
                        <button class="btn btn-primary px-4" id="send-btn" onclick="sendMessage()" disabled>
                            <i class="bi bi-send-fill"></i>
                        </button>
                    </div>
                </div>

                <!-- ASR专用上传区域 -->
                <div class="bg-white border-top p-4" id="asr-upload-area" style="display: none;">
                    <div class="asr-upload-container">
                        <div class="asr-drop-zone p-4 border-2 border-dashed rounded-3 text-center mb-3"
                             id="asr-drop-zone"
                             ondrop="handleASRDrop(event)"
                             ondragover="handleASRDragOver(event)"
                             ondragleave="handleASRDragLeave(event)"
                             onclick="document.getElementById('asr-file-input').click()">
                            <input type="file" id="asr-file-input"
                                   accept="audio/*,.mp3,.wav,.m4a,.flac,.ogg,.webm,.aac,.opus"
                                   multiple class="d-none">
                            <i class="bi bi-cloud-arrow-up fs-1 text-primary mb-2"></i>
                            <h6 class="text-muted mb-1">拖拽音频文件到此处，或点击选择</h6>
                            <small class="text-muted">支持 MP3, WAV, M4A, FLAC, OGG, WEBM, AAC, OPUS</small>
                        </div>
                        <div id="asr-pending-list" class="mb-3" style="display: none;">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <h6 class="mb-0"><i class="bi bi-list-ul me-1"></i>待处理文件</h6>
                                <button class="btn btn-outline-danger btn-sm" onclick="clearPendingFiles()">
                                    <i class="bi bi-x-lg me-1"></i>清空
                                </button>
                            </div>
                            <div id="asr-pending-files" class="list-group list-group-flush border rounded-3"></div>
                        </div>
                        <div id="asr-progress-area" class="mb-3" style="display: none;">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <span class="small text-muted" id="asr-progress-text">处理中...</span>
                                <span class="small text-muted" id="asr-progress-count">0/0</span>
                            </div>
                            <div class="progress" style="height: 6px;">
                                <div class="progress-bar progress-bar-striped progress-bar-animated"
                                     id="asr-progress-bar" role="progressbar" style="width: 0%"></div>
                            </div>
                        </div>
                        <div class="d-flex gap-2 justify-content-center">
                            <button class="btn btn-primary px-4" id="asr-start-btn" onclick="startASRBatch()" disabled>
                                <i class="bi bi-play-fill me-1"></i>开始识别
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 端点配置模态框 -->
    <div class="modal fade" id="endpointModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content border-0 shadow">
                <div class="modal-header border-bottom-0 pb-0">
                    <h5 class="modal-title fw-bold" id="endpointModalTitle">
                        <i class="bi bi-hdd-stack me-2 text-primary"></i>添加端点
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body pt-2">
                    <div class="row">
                        <!-- 左侧：端点配置 -->
                        <div class="col-md-5 border-end">
                            <form id="endpoint-form">
                                <input type="hidden" id="endpoint-id">
                                <div class="mb-3">
                                    <label class="form-label fw-semibold small">端点名称</label>
                                    <input type="text" class="form-control" id="endpoint-name" required
                                           placeholder="如：本地Ollama、OpenAI官方">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label fw-semibold small">端点类型</label>
                                    <div class="btn-group w-100" role="group">
                                        <input type="radio" class="btn-check" name="endpoint-type-radio" id="type-openai" value="openai" checked>
                                        <label class="btn btn-outline-primary" for="type-openai">
                                            <i class="bi bi-cloud me-1"></i>OpenAI
                                        </label>
                                        <input type="radio" class="btn-check" name="endpoint-type-radio" id="type-ollama" value="ollama">
                                        <label class="btn btn-outline-primary" for="type-ollama">
                                            <i class="bi bi-server me-1"></i>Ollama
                                        </label>
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label fw-semibold small">API地址</label>
                                    <input type="text" class="form-control" id="endpoint-api-url" required
                                           placeholder="OpenAI: https://api.openai.com | Ollama: http://localhost:11434">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label fw-semibold small">
                                        API密钥 <span class="text-muted small">(Ollama可省略)</span>
                                    </label>
                                    <input type="password" class="form-control" id="endpoint-api-key" placeholder="sk-...">
                                </div>
                                <div class="d-flex gap-2">
                                    <button type="button" class="btn btn-outline-secondary flex-grow-1" onclick="testEndpoint()">
                                        <i class="bi bi-wifi me-1"></i>测试连接
                                    </button>
                                    <button type="button" class="btn btn-primary flex-grow-1" onclick="saveEndpoint()">
                                        <i class="bi bi-check-lg me-1"></i>保存端点
                                    </button>
                                </div>
                            </form>
                        </div>

                        <!-- 右侧：模型管理 -->
                        <div class="col-md-7">
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <h6 class="mb-0 fw-semibold">模型管理</h6>
                                <button class="btn btn-sm btn-outline-primary" id="fetch-models-btn" onclick="fetchModels()" disabled>
                                    <i class="bi bi-cloud-download me-1"></i>拉取模型列表
                                </button>
                            </div>
                            <div id="model-list-container">
                                <div class="text-center text-muted py-4" id="model-empty-hint">
                                    <i class="bi bi-box fs-1 mb-2 d-block"></i>
                                    <small>先保存端点，再拉取模型</small>
                                </div>
                                <div id="fetched-models-list" class="list-group list-group-flush border rounded-3" style="display: none;">
                                    <!-- 拉取到的模型列表 -->
                                </div>
                                <div id="saved-models-list" class="mt-3" style="display: none;">
                                    <h6 class="small text-muted mb-2">已添加的模型</h6>
                                    <div class="list-group list-group-flush border rounded-3" id="saved-models-container"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 工具配置模态框 -->
    <div class="modal fade" id="toolModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header border-bottom-0 pb-0">
                    <h5 class="modal-title fw-bold" id="toolModalTitle">
                        <i class="bi bi-app-indicator me-2 text-primary"></i>创建工具
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body pt-2">
                    <form id="tool-form">
                        <input type="hidden" id="tool-id">
                        <div class="mb-3">
                            <label class="form-label fw-semibold small">工具名称</label>
                            <input type="text" class="form-control" id="tool-name" required placeholder="如：翻译助手、代码助手">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold small">工具类型</label>
                            <div class="row g-2">
                                <div class="col-3">
                                    <input type="radio" class="btn-check" name="tool-type-radio" id="tool-chat" value="chat" checked>
                                    <label class="btn btn-outline-success w-100 py-2" for="tool-chat">
                                        <i class="bi bi-chat-dots d-block fs-4 mb-1"></i>
                                        <small>对话</small>
                                    </label>
                                </div>
                                <div class="col-3">
                                    <input type="radio" class="btn-check" name="tool-type-radio" id="tool-thinking" value="thinking">
                                    <label class="btn btn-outline-info w-100 py-2" for="tool-thinking">
                                        <i class="bi bi-lightbulb d-block fs-4 mb-1"></i>
                                        <small>思考</small>
                                    </label>
                                </div>
                                <div class="col-3">
                                    <input type="radio" class="btn-check" name="tool-type-radio" id="tool-ocr" value="ocr">
                                    <label class="btn btn-outline-warning w-100 py-2" for="tool-ocr">
                                        <i class="bi bi-eye d-block fs-4 mb-1"></i>
                                        <small>OCR</small>
                                    </label>
                                </div>
                                <div class="col-3">
                                    <input type="radio" class="btn-check" name="tool-type-radio" id="tool-asr" value="asr">
                                    <label class="btn btn-outline-purple w-100 py-2" for="tool-asr">
                                        <i class="bi bi-mic d-block fs-4 mb-1"></i>
                                        <small>语音</small>
                                    </label>
                                </div>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold small">选择端点</label>
                            <select class="form-select" id="tool-endpoint" onchange="loadEndpointModels()">
                                <option value="">-- 请选择端点 --</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold small">选择模型</label>
                            <select class="form-select" id="tool-model" required>
                                <option value="">-- 请先选择端点 --</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold small">系统提示词</label>
                            <textarea class="form-control" id="tool-prompt" rows="4" placeholder="定义工具的角色和行为..."></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold small">描述</label>
                            <textarea class="form-control" id="tool-description" rows="2" placeholder="工具功能描述..."></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-top-0 pt-0">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary px-4" onclick="saveTool()">
                        <i class="bi bi-check-lg me-1"></i>保存
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast提示 -->
    <div class="toast-container position-fixed top-0 start-50 translate-middle-x p-3">
        <div id="toast" class="toast border-0 shadow" role="alert">
            <div class="toast-body d-flex align-items-center">
                <i class="bi me-2" id="toast-icon"></i>
                <span id="toast-message"></span>
            </div>
        </div>
    </div>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="/static/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
