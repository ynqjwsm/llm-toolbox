<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM工具箱</title>
    <link href="/static/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-layout">
        <!-- 左侧边栏 -->
        <aside class="sidebar">
            <!-- Logo -->
            <div class="sidebar-logo">
                <div class="logo-mark">
                    <span class="logo-bracket">&lt;</span>
                    <span class="logo-dot"></span>
                    <span class="logo-bracket">/&gt;</span>
                </div>
                <div class="logo-text">
                    <span class="logo-title">LLM</span>
                    <span class="logo-subtitle">TOOLBOX</span>
                </div>
                <div class="logo-line"></div>
            </div>

            <!-- 工具列表 -->
            <div class="sidebar-section">
                <div class="section-header">
                    <span class="section-label">
                        <span class="section-icon">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
                        </span>
                        工具
                    </span>
                    <button class="btn-add" onclick="showToolModal()" title="新建工具">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    </button>
                </div>
                <div class="section-body">
                    <div id="tool-list"></div>
                </div>
            </div>

            <!-- 端点管理 -->
            <div class="sidebar-section">
                <div class="section-header">
                    <span class="section-label">
                        <span class="section-icon">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="8" rx="2" ry="2"/><rect x="2" y="14" width="20" height="8" rx="2" ry="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></svg>
                        </span>
                        端点
                    </span>
                    <button class="btn-add" onclick="showEndpointModal()" title="添加端点">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    </button>
                </div>
                <div class="section-body">
                    <div id="endpoint-list"></div>
                </div>
            </div>

            <!-- 历史对话 -->
            <div class="sidebar-section">
                <div class="section-header">
                    <span class="section-label">
                        <span class="section-icon">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                        </span>
                        历史
                    </span>
                </div>
                <div class="section-body">
                    <div id="conversation-list"></div>
                </div>
            </div>

            <!-- 底部状态 -->
            <div class="sidebar-footer">
                <div class="status-dot"></div>
                <span class="status-text">就绪</span>
            </div>
        </aside>

        <!-- 右侧主区域 -->
        <main class="main-area">
            <!-- 顶部工具栏 -->
            <div class="top-bar" id="tool-header" style="display: none;">
                <div class="top-bar-left">
                    <span class="top-bar-tool-name" id="current-tool-name"></span>
                    <span class="tool-type-badge" id="current-tool-type"></span>
                </div>
                <div class="top-bar-actions">
                    <button class="top-btn" onclick="editCurrentTool()" title="编辑工具">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                    </button>
                    <button class="top-btn" onclick="clearChat()" title="清空对话">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                    </button>
                </div>
            </div>

            <!-- 对话区域 -->
            <div class="chat-viewport" id="chat-container">
                <div class="chat-messages" id="chat-messages">
                    <div class="welcome-screen">
                        <div class="welcome-grid">
                            <div class="welcome-card" onclick="showToolModal()">
                                <div class="card-icon icon-chat">
                                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                                </div>
                                <span class="card-label">创建工具</span>
                            </div>
                            <div class="welcome-card" onclick="showEndpointModal()">
                                <div class="card-icon icon-endpoint">
                                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="8" rx="2" ry="2"/><rect x="2" y="14" width="20" height="8" rx="2" ry="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></svg>
                                </div>
                                <span class="card-label">添加端点</span>
                            </div>
                        </div>
                        <div class="welcome-text">
                            <h1>LLM工具箱</h1>
                            <p>配置端点，创建工具，开始对话</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 普通输入区域 -->
            <div class="input-dock" id="chat-input-area" style="display: none;">
                <div class="image-attach-bar" id="image-upload-area" style="display: none;">
                    <input type="file" id="image-input" accept="image/*" class="d-none">
                    <button class="attach-btn" onclick="document.getElementById('image-input').click()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                        上传图片
                    </button>
                    <img id="image-preview" class="image-thumb d-none">
                    <button class="attach-remove d-none" id="remove-image-btn" onclick="removeImage()">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    </button>
                </div>
                <div class="input-row">
                    <div class="input-wrapper">
                        <textarea class="chat-input"
                                  id="chat-input" rows="1"
                                  placeholder="输入消息..."
                                  disabled></textarea>
                        <div class="input-hint">Enter 发送 · Shift+Enter 换行</div>
                    </div>
                    <div class="input-buttons">
                        <button class="btn-send" id="send-btn" onclick="sendMessage()" disabled>
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                        </button>
                        <button class="btn-stop" id="stop-btn" onclick="stopGeneration()" style="display: none;">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
                        </button>
                    </div>
                </div>
            </div>

            <!-- ASR专用上传区域 -->
            <div class="input-dock asr-dock" id="asr-upload-area" style="display: none;">
                <div class="asr-row">
                    <button class="asr-btn" onclick="document.getElementById('asr-file-input').click()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
                        选择音频
                    </button>
                    <input type="file" id="asr-file-input"
                           accept="audio/*,.mp3,.wav,.m4a,.flac,.ogg,.webm,.aac,.opus"
                           multiple class="d-none">
                    <div class="asr-controls" id="asr-pending-info" style="display: none;">
                        <span class="file-count-badge" id="asr-file-count">0</span>
                        <div class="btn-mini-group">
                            <button class="btn-mini btn-go" id="asr-start-btn" onclick="startASRBatch()" disabled>
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                            </button>
                            <button class="btn-mini btn-stop-mini" id="asr-stop-btn" onclick="stopASRBatch()" style="display: none;">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
                            </button>
                        </div>
                        <button class="btn-mini btn-clear" onclick="clearPendingFiles()" title="清空">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                        </button>
                    </div>
                    <div class="asr-progress" id="asr-progress-area" style="display: none;">
                        <div class="progress-track">
                            <div class="progress-fill" id="asr-progress-bar" style="width: 0%"></div>
                        </div>
                        <span class="progress-label" id="asr-progress-text">0/0</span>
                    </div>
                </div>
            </div>

            <!-- OCR专用上传区域 -->
            <div class="input-dock ocr-dock" id="ocr-upload-area" style="display: none;">
                <div class="asr-row">
                    <button class="asr-btn ocr-btn" onclick="document.getElementById('ocr-file-input').click()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                        选择图片
                    </button>
                    <input type="file" id="ocr-file-input"
                           accept="image/*,.jpg,.jpeg,.png,.gif,.bmp,.webp"
                           multiple class="d-none">
                    <div class="asr-controls" id="ocr-pending-info" style="display: none;">
                        <span class="file-count-badge ocr-badge" id="ocr-file-count">0</span>
                        <div class="btn-mini-group">
                            <button class="btn-mini btn-go" id="ocr-start-btn" onclick="startOCRBatch()" disabled>
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                            </button>
                            <button class="btn-mini btn-stop-mini" id="ocr-stop-btn" onclick="stopOCRBatch()" style="display: none;">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
                            </button>
                        </div>
                        <button class="btn-mini btn-clear" onclick="clearOCRFiles()" title="清空">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                        </button>
                    </div>
                    <div class="asr-progress" id="ocr-progress-area" style="display: none;">
                        <div class="progress-track ocr-track">
                            <div class="progress-fill ocr-fill" id="ocr-progress-bar" style="width: 0%"></div>
                        </div>
                        <span class="progress-label" id="ocr-progress-text">0/0</span>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 端点配置模态框 -->
    <div class="modal fade" id="endpointModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="endpointModalTitle">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="8" rx="2" ry="2"/><rect x="2" y="14" width="20" height="8" rx="2" ry="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></svg>
                        添加端点
                    </h5>
                    <button type="button" class="modal-close" data-bs-dismiss="modal">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    </button>
                </div>
                <div class="modal-body">
                    <div class="modal-grid">
                        <!-- 左侧：端点配置 -->
                        <div class="modal-panel modal-panel-left">
                            <form id="endpoint-form">
                                <input type="hidden" id="endpoint-id">
                                <div class="form-group">
                                    <label class="form-label">名称</label>
                                    <input type="text" class="form-input" id="endpoint-name" required
                                           placeholder="如：本地Ollama、OpenAI官方">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">类型</label>
                                    <div class="type-toggle">
                                        <input type="radio" class="type-check" name="endpoint-type-radio" id="type-openai" value="openai" checked>
                                        <label class="type-label" for="type-openai">
                                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/></svg>
                                            OpenAI
                                        </label>
                                        <input type="radio" class="type-check" name="endpoint-type-radio" id="type-ollama" value="ollama">
                                        <label class="type-label" for="type-ollama">
                                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="8" rx="2" ry="2"/><rect x="2" y="14" width="20" height="8" rx="2" ry="2"/></svg>
                                            Ollama
                                        </label>
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">API 地址</label>
                                    <input type="text" class="form-input" id="endpoint-api-url" required
                                           placeholder="https://api.openai.com 或 http://localhost:11434">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">API 密钥 <span class="form-hint">（Ollama 可省略）</span></label>
                                    <input type="password" class="form-input" id="endpoint-api-key" placeholder="sk-...">
                                </div>
                                <div class="form-actions">
                                    <button type="button" class="form-btn form-btn-secondary" onclick="testEndpoint()">
                                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>
                                        测试连接
                                    </button>
                                    <button type="button" class="form-btn form-btn-primary" onclick="saveEndpoint()">
                                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                                        保存
                                    </button>
                                </div>
                            </form>
                        </div>

                        <!-- 右侧：模型管理 -->
                        <div class="modal-panel">
                            <div class="model-panel-header">
                                <span class="model-panel-title">模型管理</span>
                                <button class="form-btn form-btn-small" id="fetch-models-btn" onclick="fetchModels()" disabled>
                                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                                    拉取
                                </button>
                            </div>
                            <div id="model-list-container">
                                <div class="model-empty" id="model-empty-hint">
                                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
                                    <span>请先保存端点，再拉取模型</span>
                                </div>
                                <div class="fetched-models" id="fetched-models-list" style="display: none;"></div>
                                <div class="saved-models" id="saved-models-list" style="display: none;">
                                    <div class="saved-models-title">已添加的模型</div>
                                    <div id="saved-models-container"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 工具配置模态框 -->
    <div class="modal fade" id="toolModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="toolModalTitle">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
                        创建工具
                    </h5>
                    <button type="button" class="modal-close" data-bs-dismiss="modal">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    </button>
                </div>
                <div class="modal-body">
                    <form id="tool-form">
                        <input type="hidden" id="tool-id">
                        <div class="form-group">
                            <label class="form-label">名称</label>
                            <input type="text" class="form-input" id="tool-name" required placeholder="如：翻译助手、代码助手">
                        </div>
                        <div class="form-group">
                            <label class="form-label">类型</label>
                            <div class="tool-type-grid">
                                <input type="radio" class="type-check" name="tool-type-radio" id="tool-chat" value="chat" checked>
                                <label class="tool-type-card" for="tool-chat">
                                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                                    <span>对话</span>
                                </label>
                                <input type="radio" class="type-check" name="tool-type-radio" id="tool-thinking" value="thinking">
                                <label class="tool-type-card" for="tool-thinking">
                                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6"/><path d="M10 22h4"/><path d="M12 2a7 7 0 0 0-4 12.7V17h8v-2.3A7 7 0 0 0 12 2z"/></svg>
                                    <span>思考</span>
                                </label>
                                <input type="radio" class="type-check" name="tool-type-radio" id="tool-ocr" value="ocr">
                                <label class="tool-type-card" for="tool-ocr">
                                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                                    <span>OCR</span>
                                </label>
                                <input type="radio" class="type-check" name="tool-type-radio" id="tool-asr" value="asr">
                                <label class="tool-type-card" for="tool-asr">
                                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/></svg>
                                    <span>语音</span>
                                </label>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">端点</label>
                            <select class="form-select-input" id="tool-endpoint" onchange="loadEndpointModels()">
                                <option value="">-- 请选择端点 --</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">模型</label>
                            <select class="form-select-input" id="tool-model" required>
                                <option value="">-- 请先选择端点 --</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">系统提示词</label>
                            <textarea class="form-textarea" id="tool-prompt" rows="4" placeholder="定义工具的角色和行为..."></textarea>
                        </div>
                        <div class="form-group">
                            <label class="form-label">描述</label>
                            <textarea class="form-textarea form-textarea-sm" id="tool-description" rows="2" placeholder="工具功能描述..."></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="form-btn form-btn-ghost" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="form-btn form-btn-primary" onclick="saveTool()">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                        保存
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast提示 -->
    <div class="toast-area">
        <div id="toast" class="toast-box">
            <span class="toast-icon" id="toast-icon"></span>
            <span class="toast-text" id="toast-message"></span>
        </div>
    </div>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="/static/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
